# ============================================================
# Status      : иЁ“з·ґдё­ (started 2026-04-04)
# Date        : вЂ”
# Checkpoint  : outputs/checkpoints/deeplabv3plus/<timestamp>/best.pth
# Epochs      : вЂ” / 150
#
# --- Val Metrics (threshold=еѕ…sweep) ---
# IoU         : еѕ…еЎ«
# Dice        : еѕ…еЎ«

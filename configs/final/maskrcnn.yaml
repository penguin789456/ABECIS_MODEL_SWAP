# Checkpoint  : outputs/checkpoints/maskrcnn/model_final.pth
# Iterations  : — / 8000
#
# --- Val Metrics (pixel-level, threshold=0.5) ---
# IoU         : 待填   ← 本研究重新以 pixel-level IoU 評估，與 ABECIS 原論文 instance IoU 不同
# Dice        : 待填
# Precision   : 待填
# Recall      : 待填
# clDice      : 待填
#
# --- ABECIS 原論文數據（供對比參考）---
# Original IoU : 0.958  (instance-level median IoU，非 pixel-level，不可直接比較)
# 評估說明     : 本研究在相同測試集以 pixel-level IoU 重新評估，確保跨模型比較公平
#
# --- Efficiency ---
# FPS         : ~3  (ABECIS 論文數據，本研究實測後更新)
# Latency(ms) : 待測
# Params      : ~44M  (ResNet-50 + FPN + Mask head)
# Model Size  : 待測 MB
#
# --- Notes ---
#   - 需切換環境: conda activate CrackPre
#   - 使用 Detectron2 DefaultTrainer，非 PyTorch 直接訓練
#   - 訓練指令: python training/train_maskrcnn.py --config configs/final/maskrcnn.yaml

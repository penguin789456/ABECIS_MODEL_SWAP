# ============================================================
# PP-LiteSeg-T (STDC1) — MERGED DATASET v3
# dataset_merged_v2 (3,508) + SCD pseudo-labels (~12,000 confident)
# Total: ~15,500 images  |  train~15,380  val=68  test=70 (FROZEN)
# ============================================================
# v3 key difference vs v2:
#   SCD (Surface Crack Detection) Confident pseudo-labels added.
#   Pseudo-labels generated by ABECIS Mask R-CNN (teacher model).
#   Images resized 227×227 → 512×512; masks binarised (thr > 50).
#   Positive patch ratio: ~47% (vs ~27.5% in v2) → reduced class imbalance.
#
# Prepare dataset:
#   python scripts/prepare_surface_crack.py --confidence confident
#
# Precompute patches:
#   python scripts/precompute_patches.py --config configs/final/ppliteseg_v3.yaml
#
# Train:
#   python training/train_crackseg.py --config configs/final/ppliteseg_v3.yaml
# ============================================================

model:
  name: ppliteseg
  backbone: STDC1
  pretrained: true
  num_classes: 1
  zh320_config: realtime-semantic-segmentation-pytorch/configs/ppliteseg_stdc1.py

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 150
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: dataset_merged_v3
  splits_dir: data/splits_v3
  precomputed_dir: data/patches_v3
  patch_size: 512
  overlap: 128
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  oversample_positive: true
  positive_weight: 5.0

checkpoint:
  save_dir: outputs/checkpoints/ppliteseg_v3
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall, cldice]
  threshold: 0.65
  save_predictions: true
  predictions_dir: outputs/predictions/ppliteseg_v3

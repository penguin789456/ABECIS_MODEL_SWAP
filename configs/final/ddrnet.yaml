# ============================================================
# DDRNet-23-slim — FINALIZED CONFIG
# ============================================================
# Status      : DONE
# Date        : 2026-04-17
# Checkpoint  : outputs/checkpoints/ddrnet/<timestamp>/best.pth
# Epochs      : 150
#
# --- Test Metrics (threshold=0.5) ---
# IoU         : 0.3912
# Dice        : 0.5624
# Precision   : 0.7128
# Recall      : 0.4644
# clDice      : 0.5152
#
# --- Efficiency ---
# FPS         : 待測
# Latency(ms) : 待測
# Params      : ~5.6M
# Model Size  : 待測 MB
#
# --- Notes ---
#   - DDRNet-23-slim: dual-branch real-time segmentation, 5.6M params
#   - Replaces PIDNet-S (not available in zh320 repo)
#   - arch_type: DDRNet-23-slim (default, lightweight variant)
#   - Same BCEDice + oversampling as PP-LiteSeg for fair comparison
#   - Run threshold_sweep.py after training
# ============================================================

model:
  name: ddrnet
  arch_type: DDRNet-23-slim
  pretrained: false
  num_classes: 1

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 150
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: concreteCrackSegmentationDataset
  splits_dir: data/splits
  patch_size: 512
  overlap: 128
  num_workers: 0      # Windows: single-process fastest (285 img/s vs 224 @ workers=4)
  prefetch_factor: 2  # ignored when num_workers=0
  pin_memory: false   # must be false when num_workers=0
  persistent_workers: false
  precomputed_dir: data/patches
  oversample_positive: true
  positive_weight: 5.0

checkpoint:
  save_dir: outputs/checkpoints/ddrnet
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall, cldice]
  threshold: 0.5   # update after threshold_sweep.py
  save_predictions: true
  predictions_dir: outputs/predictions/ddrnet

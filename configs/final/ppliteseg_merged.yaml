# ============================================================
# PP-LiteSeg-T (STDC1) — MERGED DATASET (Mendeley + external)
# ============================================================
# Based on   : configs/final/ppliteseg.yaml  (original, IoU=0.4391)
# Purpose    : Retrain with expanded dataset (DeepCrack / CRACK500)
# Status     : 待訓練
#
# Dataset preparation:
#   python scripts/prepare_external.py \
#       --deepcrack_dir /path/to/DeepCrack \
#       --crack500_dir  /path/to/CRACK500  \
#       --output_root   concreteCrackSegmentationDataset_merged
#
# Precompute patches:
#   python scripts/precompute_patches.py --config configs/final/ppliteseg_merged.yaml
#
# Train:
#   python training/train_crackseg.py --config configs/final/ppliteseg_merged.yaml
# ============================================================

model:
  name: ppliteseg
  backbone: STDC1
  pretrained: true
  num_classes: 1
  zh320_config: realtime-semantic-segmentation-pytorch/configs/ppliteseg_stdc1.py

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 150
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: concreteCrackSegmentationDataset_merged   # ← merged dataset
  splits_dir: data/splits_merged                  # ← merged splits (test FROZEN)
  precomputed_dir: data/patches_merged            # ← new patch cache
  patch_size: 512
  overlap: 128
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  oversample_positive: true
  positive_weight: 5.0

checkpoint:
  save_dir: outputs/checkpoints/ppliteseg_merged
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall, cldice]
  threshold: 0.65                                 # sweep again after training
  save_predictions: true
  predictions_dir: outputs/predictions/ppliteseg_merged

# ============================================================
# PP-LiteSeg-T (STDC1) — MERGED DATASET v2
# Mendeley (458) + DeepCrack (537) + CRACK500-traincrop (1896)
#                + CFD (118) + GAPS384 (509)
# Total: 3508 images  |  train=3380  val=68  test=70 (FROZEN)
# ============================================================
# Based on   : configs/final/ppliteseg_merged.yaml  (DeepCrack only, IoU=待訓練)
# Purpose    : Expanded dataset — all usable external sources
#
# Precompute patches:
#   python scripts/precompute_patches.py --config configs/final/ppliteseg_merged_v2.yaml
#
# Train:
#   python training/train_crackseg.py --config configs/final/ppliteseg_merged_v2.yaml
# ============================================================

model:
  name: ppliteseg
  backbone: STDC1
  pretrained: true
  num_classes: 1
  zh320_config: realtime-semantic-segmentation-pytorch/configs/ppliteseg_stdc1.py

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 150
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: concreteCrackSegmentationDataset_merged_v2
  splits_dir: data/splits_merged_v2
  precomputed_dir: data/patches_merged_v2
  patch_size: 512
  overlap: 128
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  oversample_positive: true
  positive_weight: 5.0

checkpoint:
  save_dir: outputs/checkpoints/ppliteseg_merged_v2
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall, cldice]
  threshold: 0.65
  save_predictions: true
  predictions_dir: outputs/predictions/ppliteseg_merged_v2

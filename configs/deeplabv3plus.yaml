# DeepLabV3+ — semantic segmentation baseline
# Inherits defaults from base.yaml; only overrides are listed here

model:
  name: deeplabv3plus
  backbone: resnet101
  pretrained: true
  num_classes: 1          # binary segmentation
  output_stride: 8

training:
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 100
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.3
  dice_weight: 0.7

dataset:
  root: concreteCrackSegmentationDataset
  splits_dir: data/splits
  patch_size: 512
  overlap: 128
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  precomputed_dir: data/patches

checkpoint:
  save_dir: outputs/checkpoints/deeplabv3plus
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall]
  save_predictions: true
  predictions_dir: outputs/predictions/deeplabv3plus

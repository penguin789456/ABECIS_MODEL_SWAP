# PP-LiteSeg-T (STDC1) — primary lightweight model
# Uses zh320/realtime-semantic-segmentation-pytorch as backbone implementation

model:
  name: ppliteseg
  backbone: STDC1
  pretrained: true
  num_classes: 1
  # Path relative to project root (after cloning zh320 repo)
  zh320_config: realtime-semantic-segmentation-pytorch/configs/ppliteseg_stdc1.py

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 32
  epochs: 150
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: concreteCrackSegmentationDataset
  splits_dir: data/splits
  precomputed_dir: data/patches   # generated by: python scripts/precompute_patches.py
  patch_size: 512
  overlap: 128
  num_workers: 4
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  oversample_positive: true       # oversample patches containing cracks
  positive_weight: 5.0            # crack patches are 5x more likely to be sampled

checkpoint:
  save_dir: outputs/checkpoints/ppliteseg
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall]
  threshold: 0.6   # tuned via threshold_sweep.py on FocalDice best.pth
  save_predictions: true
  predictions_dir: outputs/predictions/ppliteseg

# PIDNet-S — real-time comparison model
# Uses zh320/realtime-semantic-segmentation-pytorch

model:
  name: pidnet
  variant: pidnet_s          # Small variant for fair speed comparison with PP-LiteSeg-T
  pretrained: true
  num_classes: 1

training:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 8
  epochs: 100
  warmup_epochs: 5
  scheduler: cosine
  seed: 42
  output_dir: outputs

loss:
  type: bce_dice
  bce_weight: 0.5
  dice_weight: 0.5

dataset:
  root: concreteCrackSegmentationDataset
  splits_dir: data/splits
  patch_size: 512
  overlap: 128
  num_workers: 4
  pin_memory: true

checkpoint:
  save_dir: outputs/checkpoints/pidnet
  save_best_metric: iou
  save_every_n_epochs: 10

evaluation:
  metrics: [iou, dice, precision, recall]
  save_predictions: true
  predictions_dir: outputs/predictions/pidnet

name: CrackSeg
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - cudatoolkit=11.8
  - pip
  - pip:
      - torch==2.1.2+cu118
      - torchvision==0.16.2+cu118
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - numpy>=1.24,<2.0
      - opencv-python==4.9.0.80
      - pillow>=10.0
      - albumentations>=1.3.1
      - torchmetrics>=1.2
      - loguru
      - tqdm
      - pyyaml
      - matplotlib>=3.7
      - scikit-image>=0.21
      - scipy>=1.11
      - pandas>=2.0
      - tensorboard

name: CrackSeg
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # RTX 50 series (Blackwell sm_120) requires PyTorch nightly with CUDA 12.8
      # Replace with a stable release once PyTorch >= 2.7 stable is available
      - --pre
      - --index-url https://download.pytorch.org/whl/nightly/cu128
      - torch==2.12.0.dev20260327+cu128
      - torchvision==0.26.0.dev20260326+cu128
      - numpy>=1.24,<2.0
      - opencv-python==4.9.0.80
      - pillow>=10.0
      - albumentations>=1.3.1
      - torchmetrics>=1.2
      - loguru
      - tqdm
      - pyyaml
      - matplotlib>=3.7
      - scikit-image>=0.21
      - scipy>=1.11
      - pandas>=2.0
      - tensorboard
